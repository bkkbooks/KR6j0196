body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯并依釋略序爾時毗盧遮那如來於他化自在天王宮為諸大菩薩等説此般若波羅蜜甚深理趣十七清淨句門蓋是十七大菩薩三摩地之句義也為令能住持者疾至菩提故遂演此十七聖位大曼茶羅如來與諸大士等所説密語依此修行速疾成就何者為一十七聖其一所謂大樂不空三昧真實金剛菩薩蓋表諸佛普賢之身周遍器世間及有情世間以其無邊自在理常體寂不妄不壞故有是名也左持金剛鈴是適悅義置腰之左表大我焉右持五股金剛杵是五智義轉拳向外示衆生也於曼茶羅據其中位而總其衆相除是而有一十六位焉蓋正覺之徑路其二所謂意生金剛菩薩以大悲欲箭害二乘心所以手持是箭而現其欲離俱幻平等智身其三所謂髻利吉羅金剛菩薩於中國之言名觸以不捨衆生必令解脫故欲明觸性即菩提故所以住抱持相而現其觸淨俱幻平等智身其四所謂悲愍金剛菩薩以悲愍故以愛念繩普縛衆生未至菩提終不放捨亦如摩竭大魚吞啖所遇一入口已更無免者所以持此摩竭魚幢而現其愛縛捨離俱幻平等智身其五所謂金剛慢菩薩以無過上智令一切衆生悉證毗盧遮那如來體於世出世間皆得自在所以住傲誕威儀而現其我無我俱幻平等智身其六所謂金剛見菩薩以寂照大慧之眼於雜染界妙淨土乃至真諦俗諦唯見一切法勝義真實之諦不散不動所以持意生之契而現其三昧之身其七所謂金剛適悅菩薩於身塵而得適悅清淨於生死解脫不厭不住所以持觸金剛相而現其三昧之身其八所謂金剛貪菩薩即貪愛而得清淨故遂能以貪而積集一切功德智慧疾證菩提由住貪愛性故所以持悲愍之契而現其三昧之身其九所謂金剛自在菩薩出入三界自在無畏於生死涅槃而得大我之體所以住金剛慢相而現其三昧之身其十所謂金剛春菩薩能以菩提覺花起供養雲海亦以方便授與衆生作功德利以花是春事遂以名之故亦持花以為其契其十一所謂金剛雲菩薩能以法澤慈雲滋潤含識亦以方便授諸身心使無始無明臭穢不善化成無量供養香雲以爐煙像雲遂以為號故持焚香之器以為契焉其十二所謂金剛秋菩薩常以智燈破諸黑暗亦以方便授與衆生起無量光明供養雲海以其空色清爽莫如秋時欲表智光之體遂以名之故執燈明以為其契其十三所謂金剛霜雪菩薩能以五無漏蘊香塗衆生心體滅煩惱之穢熱成五分法身之香亦以方便授與衆生起塗香供養雲海以栴檀塗香解諸毒熱有似霜雪遂以名之故執塗香以為其契其十四所謂金剛色菩薩以色清淨智於淨妙界起受用色身於雜染界起變化色身而為攝來之事故以持鉤為契其十五所謂金剛聲菩薩以聲清淨智能表六十四種梵音普周法界而為引入之事故持索以為契其十六所謂金剛香菩薩以香清淨智發金剛界自然名稱之香入一切散動心以為止留之事故以持鎖為契其十七所謂金剛味菩薩以味清淨智持瑜伽三摩地無上法味以為歡樂之事故持鈴為契如是等大菩薩十七清淨三摩地智依文廣述有無量名義體用理事成證之門今但粗舉綱目而已出金剛頂經第十三會大三昧耶真實瑜伽略鈔大意
